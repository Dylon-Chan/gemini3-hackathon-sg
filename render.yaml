services:
  - type: web
    name: singflix-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: PYTHONPATH=. uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      # --- Vertex AI auth (service account) ---
      - key: GOOGLE_CLOUD_PROJECT
        sync: false          # set manually in Render dashboard
      - key: GOOGLE_CLOUD_LOCATION
        value: us-central1
      - key: GOOGLE_APPLICATION_CREDENTIALS
        value: /etc/secrets/genai-sa.json   # path to Secret File (see below)

      # --- Model IDs ---
      - key: GEMINI_MODEL
        value: gemini-2.5-pro
      - key: GEMINI_IMAGE_MODEL
        value: gemini-2.0-flash-exp-image-generation
      - key: VEO_MODEL
        value: veo-3.0-generate-001

      # --- Veo output: Vertex AI returns GCS URIs, not raw bytes ---
      - key: USE_VERTEX_AI
        value: "true"
      - key: VEO_OUTPUT_GCS_BUCKET
        sync: false          # set manually in Render dashboard

      # --- Pipeline tuning ---
      - key: GEMINI_CONCURRENCY
        value: "3"
      - key: VEO_POLL_INTERVAL_SECONDS
        value: "10"
      - key: VEO_MAX_POLL_ATTEMPTS
        value: "60"
      - key: PYTHONUNBUFFERED
        value: "1"
